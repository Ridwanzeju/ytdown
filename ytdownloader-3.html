<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Download Video YT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --card: #14142b;
      --card2: #1a1a35;
      --border: #2a2a4a;
      --accent: #e63c5c;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #7070a0;
      --success: #22c55e;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .logo {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; fill: white; }
    h1 { font-size: 1.7rem; font-weight: 700; }
    h1 span { color: var(--accent); }
    .tagline {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 560px;
    }

    /* INPUT ROW */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      gap: 8px;
    }
    .input-wrap svg { width: 18px; height: 18px; fill: var(--muted); flex-shrink: 0; }
    .input-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      padding: 13px 0;
      font-family: inherit;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .btn-cari {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-cari:hover { background: #c42e4a; }
    .btn-cari:active { transform: scale(0.97); }
    .btn-cari:disabled { opacity: 0.5; cursor: not-allowed; }

    /* QUALITY */
    .label { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
    .quality-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .q-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d0d1a;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .q-btn:hover { border-color: var(--accent); color: var(--accent); }
    .q-btn.active { background: transparent; border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

    /* DIVIDER */
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* VIDEO INFO */
    .video-info { display: none; }
    .video-info.show { display: flex; gap: 14px; align-items: flex-start; }
    .thumb-wrap { flex-shrink: 0; }
    .thumb-wrap img { width: 110px; border-radius: 8px; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .video-meta { flex: 1; min-width: 0; }
    .video-title { font-size: 0.92rem; font-weight: 600; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-author { font-size: 0.8rem; color: var(--muted); }

    /* SIZE INFO */
    .size-row {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 16px;
    }
    .size-row.show { display: flex; }
    .size-icon { width: 32px; height: 32px; background: rgba(230,60,92,0.12); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .size-icon svg { width: 16px; height: 16px; fill: var(--accent); }
    .size-label { font-size: 0.8rem; color: var(--muted); }
    .size-value { font-size: 1rem; font-weight: 700; color: var(--text); }
    .size-checking { font-size: 0.82rem; color: var(--muted); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* DOWNLOAD BTN */
    .btn-download {
      display: none;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #c42e4a);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.1s;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-download.show { display: flex; }
    .btn-download:hover { opacity: 0.88; }
    .btn-download:active { transform: scale(0.98); }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-download svg { width: 18px; height: 18px; fill: white; }

    /* PROGRESS */
    .progress-wrap { display: none; margin-top: 12px; }
    .progress-wrap.show { display: block; }
    .progress-bar-bg { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar-fill { background: var(--accent); height: 100%; width: 0%; border-radius: 99px; transition: width 0.3s; }
    .progress-text { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }

    /* ERROR */
    .error-msg {
      display: none;
      background: rgba(230,60,92,0.1);
      border: 1px solid rgba(230,60,92,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--accent2);
      margin-top: 14px;
    }
    .error-msg.show { display: block; }

    /* FOOTER */
    footer {
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      h1 { font-size: 1.35rem; }
      .input-row { flex-direction: column; }
      .btn-cari { padding: 13px; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <h1>Free <span>Download Video YT</span></h1>
  </div>
  <p class="tagline">Dengan gratis dan tanpa iklan 🎉</p>

  <div class="card">
    <!-- INPUT -->
    <div class="input-row">
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="url" id="urlInput" placeholder="Tempel link YouTube di sini..." />
      </div>
      <button class="btn-cari" id="btnCari" onclick="fetchInfo()">Cari</button>
    </div>

    <!-- QUALITY -->
    <div class="label">Pilih Kualitas</div>
    <div class="quality-row" id="qualityRow">
      <button class="q-btn" onclick="setQuality(this,'360')">360p</button>
      <button class="q-btn" onclick="setQuality(this,'480')">480p</button>
      <button class="q-btn active" onclick="setQuality(this,'720')">720p HD</button>
      <button class="q-btn" onclick="setQuality(this,'1080')">1080p FHD</button>
    </div>

    <hr class="divider" id="divider" style="display:none"/>

    <!-- VIDEO INFO -->
    <div class="video-info" id="videoInfo">
      <div class="thumb-wrap">
        <img id="thumbImg" src="" alt="thumbnail"/>
      </div>
      <div class="video-meta">
        <div class="video-title" id="videoTitle"></div>
        <div class="video-author" id="videoAuthor"></div>
      </div>
    </div>

    <!-- FILE SIZE -->
    <div class="size-row" id="sizeRow">
      <div class="size-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8" fill="none" stroke="white" stroke-width="2"/></svg>
      </div>
      <div>
        <div class="size-label">Ukuran File</div>
        <div id="sizeValue" class="size-value">—</div>
      </div>
      <div id="sizeChecking" class="size-checking" style="margin-left:auto; display:none">Mengecek...</div>
    </div>

    <!-- ERROR -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- DOWNLOAD BUTTON -->
    <button class="btn-download" id="btnDownload" onclick="startDownload()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Download Video
    </button>

    <!-- PROGRESS -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Mempersiapkan download...</div>
    </div>
  </div>

  <footer>
    Powered by Sonzai X API · Web By- BANG RZ🫠 · Hanya untuk keperluan pribadi
  </footer>

<script>
  const BASE_INFO = "https://api.sonzaix.indevs.in/youtube/info";
  const BASE_DL   = "https://api.sonzaix.indevs.in/youtube/download";

  let selectedQuality = "720";
  let currentUrl = "";
  let downloadUrl = "";

  function setQuality(el, q) {
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedQuality = q;
    if (currentUrl) {
      showEstimatedSize();
      refreshDownloadLink(); // ambil link baru di background, disable tombol sementara
    }
  }

  async function refreshDownloadLink() {
    const btn = document.getElementById('btnDownload');
    btn.disabled = true;
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg> Menyiapkan ${selectedQuality}p...`;
    directDownloadUrl = "";
    videoFilename = "";

    try {
      const res = await fetch(buildDownloadUrl(currentUrl, selectedQuality));
      const data = await res.json();
      if (data.status === "success" && data.download_link) {
        directDownloadUrl = data.download_link;
        videoFilename = data.filename || "";
      }
    } catch (e) { /* tetap pakai estimasi */ }

    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg> Download ${selectedQuality}p`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function buildDownloadUrl(ytUrl, quality) {
    return `${BASE_DL}?url=${encodeURIComponent(ytUrl)}&format=mp4&quality=${quality}&audioBitrate=128&vCodec=h264`;
  }

  async function fetchInfo() {
    const input = document.getElementById('urlInput').value.trim();
    if (!input) { showError("Masukkan link YouTube terlebih dahulu."); return; }
    if (!input.includes("youtube.com") && !input.includes("youtu.be")) {
      showError("Link tidak valid. Gunakan link YouTube yang benar."); return;
    }

    hideError();
    currentUrl = input;
    const btn = document.getElementById('btnCari');
    btn.disabled = true;
    btn.textContent = "Mencari...";

    try {
      const res = await fetch(`${BASE_INFO}?url=${encodeURIComponent(input)}`);
      if (!res.ok) throw new Error("Gagal mengambil info video.");
      const data = await res.json();
      if (data.status !== "success") throw new Error("Video tidak ditemukan.");

      document.getElementById('thumbImg').src = data.thumbnail;
      document.getElementById('videoTitle').textContent = data.title;
      document.getElementById('videoAuthor').textContent = data.author;
      videoDuration = data.duration || 0;
      document.getElementById('videoInfo').classList.add('show');
      document.getElementById('divider').style.display = '';
      document.getElementById('btnDownload').classList.add('show');

      fetchFileSize();
    } catch (e) {
      showError(e.message || "Terjadi kesalahan. Coba lagi.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Cari";
    }
  }

  let directDownloadUrl = "";
  let videoFilename = "";
  let videoDuration = 0; // detik

  // Estimasi ukuran berdasarkan durasi + kualitas (bitrate rata-rata)
  const BITRATE = { "360": 400, "480": 700, "720": 1400, "1080": 2800 }; // kbps

  function showEstimatedSize() {
    const sizeRow = document.getElementById('sizeRow');
    const sizeVal = document.getElementById('sizeValue');
    const checking = document.getElementById('sizeChecking');
    sizeRow.classList.add('show');
    checking.style.display = 'none';
    if (videoDuration > 0) {
      const bps = (BITRATE[selectedQuality] || 1400) * 1000 / 8;
      const bytes = bps * videoDuration;
      sizeVal.textContent = "~" + formatBytes(bytes);
    } else {
      sizeVal.textContent = "Perkiraan: " + qualityLabel(selectedQuality);
    }
  }

  function qualityLabel(q) {
    return { "360": "kecil (<100 MB)", "480": "sedang (~150 MB)", "720": "besar (~300 MB)", "1080": "sangat besar (~600 MB)" }[q] || "—";
  }

  async function fetchFileSize() {
    showEstimatedSize();
    await refreshDownloadLink();
  }

  function formatBytes(bytes) {
    if (bytes === 0) return "0 B";
    const k = 1024;
    const sizes = ["B", "KB", "MB", "GB"];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
  }

  async function startDownload() {
    const btn = document.getElementById('btnDownload');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    // Kalau link belum siap, fetch dulu
    if (!directDownloadUrl) {
      btn.disabled = true;
      btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg> Menyiapkan...`;
      try {
        const r = await fetch(buildDownloadUrl(currentUrl, selectedQuality));
        const d = await r.json();
        if (d.status !== "success" || !d.download_link) throw new Error();
        directDownloadUrl = d.download_link;
        videoFilename = d.filename || "";
      } catch {
        showError("Gagal mendapatkan link download. Coba lagi.");
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg> Download ${selectedQuality}p`;
        return;
      }
    }

    // Buka link download langsung — browser handle otomatis, tidak kena CORS
    window.open(directDownloadUrl, "_blank");

    // Tampilkan feedback sukses
    progressWrap.classList.add('show');
    progressFill.style.width = "100%";
    progressText.textContent = "✅ Link download dibuka! Simpan file dari tab/notifikasi browser.";
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg> Download Video`;
  }

  // Enter key support
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>
</body>
</html>
