<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(19,19,26,0.80);
      --border: rgba(255,255,255,0.08);
      --red: #ff2d55;
      --red-dim: rgba(255,45,85,0.12);
      --red-glow: rgba(255,45,85,0.35);
      --text: #f0f0f5;
      --muted: #8b8ba0;
      --success: #30d158;
    }

    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      background: linear-gradient(-45deg, #0d0d1a, #1a0a2e, #0a1628, #1a0d2e, #0d1a1a, #2a0a1e);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--red);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px var(--red-glow);
    }

    .logo-icon svg { width: 20px; height: 20px; fill: white; }

    .logo-text {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--red); }

    header p {
      color: var(--muted);
      font-size: 14px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
    }

    /* Input group */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      fill: var(--muted);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 14px 14px 14px 42px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--red); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn-search {
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 0 22px;
      transition: opacity 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn-search:hover { opacity: 0.88; box-shadow: 0 0 16px var(--red-glow); }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Quality selector */
    .quality-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .quality-row label {
      font-size: 12px;
      color: var(--muted);
      width: 100%;
      margin-bottom: 4px;
    }

    .q-btn {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      transition: all 0.15s;
    }

    .q-btn:hover { border-color: var(--red); color: var(--text); }
    .q-btn.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }

    /* Result */
    #result { display: none; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0 24px;
    }

    .video-info {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .thumbnail-wrap {
      flex-shrink: 0;
      position: relative;
    }

    .thumbnail-wrap img {
      width: 140px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
    }

    .play-badge {
      position: absolute;
      bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 600;
      color: white;
    }

    .video-meta { flex: 1; min-width: 0; }

    .video-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-channel {
      font-size: 13px;
      color: var(--muted);
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      margin-top: 20px;
      padding: 15px;
      text-decoration: none;
      transition: opacity 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .btn-download:hover { opacity: 0.88; box-shadow: 0 0 20px var(--red-glow); }

    .btn-download svg { width: 18px; height: 18px; fill: white; }

    /* Status */
    #status {
      text-align: center;
      padding: 20px 0 4px;
      font-size: 14px;
      color: var(--muted);
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      background: rgba(255,45,85,0.08);
      border: 1px solid rgba(255,45,85,0.25);
      border-radius: 10px;
      color: #ff6b84;
      font-size: 13px;
      padding: 12px 16px;
      margin-top: 16px;
      display: none;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M10 15.5v-7l6 3.5-6 3.5zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
    </div>
    <div class="logo-text">Free <span>Download Video YT</span></div>
  </div>
  <p>Dengan gratis dan tanpa iklan ðŸŽ‰</p>
</header>

<div class="card">
  <div class="input-group">
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
      <input type="text" id="url-input" placeholder="Tempel link YouTube di sini..."/>
    </div>
    <button class="btn-search" id="btn-fetch" onclick="fetchVideo()">Cari</button>
  </div>

  <div class="quality-row">
    <label>Pilih Kualitas</label>
    <button class="q-btn" onclick="setQuality(this,'360')">360p</button>
    <button class="q-btn" onclick="setQuality(this,'480')">480p</button>
    <button class="q-btn active" onclick="setQuality(this,'720')">720p HD</button>
    <button class="q-btn" onclick="setQuality(this,'1080')">1080p FHD</button>
  </div>

  <div id="status"><span class="spinner"></span> Memproses video...</div>
  <div id="error-msg"></div>

  <div id="result">
    <hr class="divider"/>
    <div class="video-info">
      <div class="thumbnail-wrap">
        <img id="thumb" src="" alt="Thumbnail"/>
        <span class="play-badge" id="quality-badge">720p</span>
      </div>
      <div class="video-meta">
        <div class="video-title" id="vid-title">â€”</div>
        <div class="video-channel" id="vid-channel">â€”</div>
        <div id="vid-size" style="margin-top:6px;font-size:12px;color:#30d158;">ðŸ“¦ <span id="size-text">Menghitung...</span></div>
      </div>
    </div>
    <a class="btn-download" id="btn-dl" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
      Download Video
    </a>
  </div>
</div>



<script>
  let selectedQuality = '720';

  function setQuality(el, q) {
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedQuality = q;
  }

  function extractVideoId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/,
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  async function fetchVideo() {
    const urlInput = document.getElementById('url-input').value.trim();
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const errorEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-fetch');

    errorEl.style.display = 'none';
    resultEl.style.display = 'none';

    if (!urlInput) {
      showError('Masukkan link YouTube terlebih dahulu.');
      return;
    }

    const videoId = extractVideoId(urlInput);
    if (!videoId) {
      showError('Link YouTube tidak valid. Contoh: https://www.youtube.com/watch?v=...');
      return;
    }

    const encodedUrl = encodeURIComponent(urlInput);
    const apiUrl = `https://api.sonzaix.indevs.in/youtube/download?url=${encodedUrl}&format=mp4&quality=${selectedQuality}&audioBitrate=128&vCodec=h264`;
    btn.disabled = true;
    statusEl.style.display = 'block';

    try {
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (data.status !== 'success') throw new Error('API gagal memproses video.');

      document.getElementById('thumb').src = data.thumbnail || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
      document.getElementById('vid-title').textContent = data.title || 'Judul tidak tersedia';
      document.getElementById('vid-channel').textContent = data.channel || 'Channel tidak diketahui';
      document.getElementById('quality-badge').textContent = selectedQuality + 'p';
      document.getElementById('btn-dl').href = data.download_link;

      // Tampilkan ukuran file dari durasi real + kualitas
      const sizeEl = document.getElementById('vid-size');
      const sizeTxt = document.getElementById('size-text');

      // Selalu tampilkan ukuran â€” real atau estimasi
      const bitrateMap = { '360': 500, '480': 1000, '720': 2500, '1080': 5000 };
      const bitrate = bitrateMap[selectedQuality] || 2500;
      const durasiDetik = data.duration_seconds || 240;
      const estimasiMB = ((bitrate * durasiDetik) / 8 / 1024).toFixed(1);
      const menit = Math.floor(durasiDetik / 60);
      const detik = durasiDetik % 60;
      const durasiStr = data.duration_seconds
        ? menit + ':' + String(detik).padStart(2, '0') + ' mnt'
        : 'Â±4 mnt';

      if (data.file_size_mb) {
        sizeTxt.textContent = data.file_size_mb + ' MB Â· ' + durasiStr;
      } else {
        sizeTxt.textContent = '~' + estimasiMB + ' MB Â· ' + durasiStr;
      }
      sizeEl.style.display = 'block';

      resultEl.style.display = 'block';
    } catch (err) {
      showError('Gagal mengambil data. Pastikan link benar atau coba lagi. (' + err.message + ')');
    } finally {
      statusEl.style.display = 'none';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = 'âš ï¸ ' + msg;
    el.style.display = 'block';
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchVideo();
  });
</script>

</body>
</html>
